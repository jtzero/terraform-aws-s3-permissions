name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    needs: [stack-test, lint-and-test]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [[ "${{ needs.lint-and-test.result }}" != "success" ]]; then
            echo "lint-and-test failed"; exit 1
          fi
          if [[ "${{ needs.stack-test.result }}" != "success" ]]; then
            echo "stack-test failed"; exit 1
          fi
          echo "All required jobs passed"

  stack-test:
    runs-on: ubuntu-latest
    steps:
      - name: apt items
        run: |
          sudo add-apt-repository main
          sudo add-apt-repository universe
          sudo apt-get update && sudo apt-get install build-essential libssl-dev zlib1g-dev \
               libbz2-dev libreadline-dev libsqlite3-dev wget curl llvm \
               libncursesw5-dev xz-utils tk-dev libxml2-dev libxmlsec1-dev \
               libffi-dev liblzma-dev
      - name: Install asdf & tools
        uses: asdf-vm/actions/setup@v4

      - name: Checkout code
        uses: actions/checkout@v4

      - name: install stack
        run: ./scripts/install-stack

      - name: run stack tests
        run: ./scripts/stack-tests


  lint-and-test:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install asdf & tools
        uses: asdf-vm/actions/setup@v4

      - name: Add keep-sorted plugin
        run: asdf plugin add keep-sorted https://github.com/jtzero/asdf-keep-sorted

      - name: Add tflint plugin
        run: asdf plugin add tflint

      - name: Add terraform plugin
        run: asdf plugin add terraform

      - name: Install tools
        run: asdf install

      - name: Lint
        run: ./scripts/lint

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform

      - name: Run tests
        run: ./scripts/run-tests
